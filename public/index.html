<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tactical Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e14;--surface:#131920;--surface2:#1a222c;--surface3:#222d3a;
  --border:#2a3545;--text:#e0e6ed;--text2:#8899aa;--text3:#556677;
  --pitch:#1a6b37;--pitch-line:rgba(255,255,255,.6);--pitch-dark:#145a2d;
  --accent:#e8b624;--accent2:#f0c84a;--accent-dim:rgba(232,182,36,.15);
  --red:#e8364a;--blue:#3a8fd6;
  --marker:#e8b624;--marker-text:#0a0e14;--marker-bench:#3a8fd6;
  --radius:6px;--shadow:0 2px 8px rgba(0,0,0,.4);
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* DEBUG */
.debug{padding:6px 14px;background:#1a1206;border-bottom:1px solid #3a2a08;font-size:11px;
  color:var(--accent);flex-shrink:0;display:none;max-height:90px;overflow-y:auto;font-family:monospace;line-height:1.5}
.debug.visible{display:block}
.debug .err{color:var(--red)}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:6px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent);white-space:nowrap}
.hdr select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  padding:4px 8px;border-radius:var(--radius);font-size:12px;font-family:inherit;cursor:pointer;outline:none;max-width:180px}
.hdr select:focus{border-color:var(--accent)}
.team-badge{width:26px;height:26px;border-radius:50%;object-fit:contain;background:var(--surface3)}
.hdr .sp{flex:1}

/* FIXTURES */
.fix-row{display:flex;gap:5px;padding:5px 14px;flex-shrink:0;overflow-x:auto;
  background:var(--surface);border-bottom:1px solid var(--border)}
.fix-row::-webkit-scrollbar{height:2px}
.fix-row::-webkit-scrollbar-thumb{background:var(--border)}
.fix-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:3px 8px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;transition:.15s}
.fix-btn:hover{border-color:var(--accent);color:var(--text)}
.fix-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.fix-btn img{width:18px;height:18px;border-radius:50%;object-fit:contain}
.fix-btn .fo{font-weight:600;color:var(--text)}
.fix-btn .fd{font-size:9px;color:var(--text3)}
.fix-btn .fs{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--accent);letter-spacing:1px}
.no-fix{color:var(--text3);font-size:11px;font-style:italic;padding:2px 0}

/* TABS */
.tabs{display:flex;align-items:center;padding:0 14px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border)}
.tab{padding:6px 12px;background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-family:inherit;font-size:11px;color:var(--text2);transition:.15s;
  display:flex;flex-direction:column;align-items:center;gap:1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .tf{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;opacity:.7}
.tab.active .tf{opacity:1}
.tabs .sp{flex:1}
.fm-sel{display:flex;align-items:center;gap:5px;padding:5px 0}
.fm-sel label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.fm-sel select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  padding:3px 6px;border-radius:var(--radius);font-size:12px;font-family:'Bebas Neue',sans-serif;
  letter-spacing:1.5px;cursor:pointer;outline:none}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* PITCH */
.pitch-col{flex:1;display:flex;justify-content:center;align-items:center;padding:6px;min-width:0;min-height:0}
.pitch{position:relative;background:var(--pitch);border-radius:4px;overflow:hidden;
  box-shadow:0 0 0 3px var(--pitch-dark),var(--shadow);touch-action:none;user-select:none}
.pitch svg.pl{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* SIDEBAR */
.sidebar{width:190px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);
  background:var(--surface);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border)}
.sb-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);
  font-family:'Bebas Neue',sans-serif;font-size:12px;padding:8px 10px 4px}
.bench-list{display:flex;flex-direction:column;gap:2px;padding:0 6px 6px}
.bp{display:flex;align-items:center;gap:4px;padding:3px 6px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;font-size:11px;color:var(--text2);transition:.15s;font-family:inherit}
.bp:hover{border-color:var(--marker-bench);color:var(--text)}
.bp.swap-target{border-color:var(--red);background:rgba(232,54,74,.1)}
.bp .bpos{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--marker-bench);min-width:22px;text-align:center}
.bp .bname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notes-wrap{padding:6px;margin-top:auto}
.notes-wrap textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:var(--radius);padding:6px 8px;font-size:11px;
  font-family:inherit;resize:none;height:60px;outline:none}
.notes-wrap textarea::placeholder{color:var(--text3)}
.notes-wrap textarea:focus{border-color:var(--accent)}

/* PLAYER MARKERS */
.pm{position:absolute;width:46px;height:46px;transform:translate(-50%,-50%);
  cursor:grab;z-index:10;display:flex;flex-direction:column;align-items:center}
.pm.dragging{z-index:100;cursor:grabbing}
.pm.dragging .dot{box-shadow:0 0 16px rgba(232,182,36,.6)}
.pm.swap-src .dot{box-shadow:0 0 0 3px var(--red),0 0 12px rgba(232,54,74,.4)}
.dot{width:36px;height:36px;border-radius:50%;background:var(--marker);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.5px;
  color:var(--marker-text);font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.5);
  border:2px solid rgba(255,255,255,.2)}
.pname{font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);
  white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;
  margin-top:2px;text-align:center;font-weight:600;line-height:1.1}
.pnum{opacity:.7;font-weight:400;font-size:10px}
.bnum{opacity:.5;font-size:10px;margin-left:auto;flex-shrink:0}

.pitch-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.3);font-size:13px;text-align:center;padding:20px;pointer-events:none}

/* TOAST */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--surface3);color:var(--text);padding:6px 14px;border-radius:var(--radius);
  font-size:11px;box-shadow:var(--shadow);z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:700px){
  .main{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;border-left:none;border-top:1px solid var(--border);
    max-height:110px;overflow-y:auto}
  .sb-label{padding:4px 8px 2px}
  .bench-list{flex-direction:row;flex-wrap:wrap;padding:2px 6px}
  .notes-wrap{margin-top:0;flex:1;min-width:150px}
}
</style>
</head>
<body>

<div class="debug" id="debug"></div>

<div class="hdr">
  <div class="logo">TACTICAL BOARD</div>
  <select id="selLeague"><option value="">League...</option></select>
  <select id="selTeam" disabled><option value="">Team...</option></select>
  <img id="badge" class="team-badge" style="display:none" alt="">
  <div class="sp"></div>
</div>

<div class="fix-row" id="fixRow">
  <span class="no-fix">Select a team to load fixtures</span>
</div>

<div class="tabs">
  <button class="tab active" data-tab="base"><span>Base Shape</span><span class="tf" id="tfBase">4-3-3</span></button>
  <button class="tab" data-tab="inPoss"><span>In Possession</span><span class="tf" id="tfInPoss">4-3-3</span></button>
  <button class="tab" data-tab="outPoss"><span>Out of Poss</span><span class="tf" id="tfOutPoss">4-3-3</span></button>
  <div class="sp"></div>
  <div class="fm-sel">
    <label>Form.</label>
    <select id="selForm"></select>
  </div>
</div>

<div class="main">
  <div class="pitch-col" id="pitchCol">
    <div class="pitch" id="pitch">
      <div class="pitch-empty" id="pitchEmpty">Select a league and team to begin</div>
      <div id="players"></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sb-label">BENCH</div>
    <div class="bench-list" id="benchList"></div>
    <div class="notes-wrap">
      <div class="sb-label" style="padding:4px 0 2px">NOTES</div>
      <textarea id="notes" placeholder="Tactical notes..."></textarea>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

/* ═══ CONSTANTS ══════════════════════════════════════ */

const POS={24:'GK',148:'CB',149:'LB',150:'RB',151:'DM',152:'CM',153:'LWB',154:'RWB',
  155:'AM',156:'LM',157:'RM',158:'LW',159:'RW',160:'CF',161:'ST',162:'SS'};
const GPOS={24:'GK',25:'DEF',26:'MID',27:'FWD'};
const FORMS=['3-4-3','3-5-2','3-4-1-2','4-3-3','4-4-2','4-2-3-1','4-1-4-1',
  '4-4-1-1','4-5-1','4-1-2-1-2','4-2-2-2','5-3-2','5-4-1','5-2-3'];
const TABS=['base','inPoss','outPoss'];

/* ═══ STATE ══════════════════════════════════════════ */

let S={leagues:[],teams:[],squad:[],fixtures:[],
  selLeague:null,selTeam:null,selFixture:null,
  activeTab:'base',swapSrc:null,
  tabs:{base:{form:'4-3-3',players:[],notes:''},
        inPoss:{form:'4-3-3',players:[],notes:''},
        outPoss:{form:'4-3-3',players:[],notes:''}},
  bench:[]};

/* ═══ DOM ════════════════════════════════════════════ */

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const selLeague=$('#selLeague'),selTeam=$('#selTeam'),selForm=$('#selForm');
const badge=$('#badge'),fixRow=$('#fixRow');
const pitchEl=$('#pitch'),pitchCol=$('#pitchCol'),playersEl=$('#players'),pitchEmpty=$('#pitchEmpty');
const benchList=$('#benchList'),notesEl=$('#notes'),toastEl=$('#toast'),debugEl=$('#debug');

/* ═══ DEBUG ══════════════════════════════════════════ */

function dbg(msg,isErr){
  debugEl.classList.add('visible');
  const d=document.createElement('div');
  if(isErr) d.className='err';
  d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;
  debugEl.prepend(d);
  if(debugEl.children.length>30) debugEl.removeChild(debugEl.lastChild);
}

/* ═══ API — uses ?endpoint= plus separate query params ═══ */

async function api(endpoint, params){
  params=params||{};
  const u=new URL('/api/proxy',location.origin);
  u.searchParams.set('endpoint',endpoint);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v)));
  const url=u.toString();
  dbg('→ '+endpoint+' '+JSON.stringify(params));
  try{
    const r=await fetch(url);
    const txt=await r.text();
    let json;
    try{json=JSON.parse(txt)}catch(pe){
      dbg('Parse error: '+txt.substring(0,200),true);
      throw new Error('Invalid JSON from proxy');
    }
    if(!r.ok){
      dbg('HTTP '+r.status+': '+JSON.stringify(json).substring(0,200),true);
      throw new Error('API '+r.status);
    }
    if(json.error){
      dbg('API error: '+JSON.stringify(json.error),true);
      throw new Error(typeof json.error==='string'?json.error:JSON.stringify(json.error));
    }
    const count=json.data?json.data.length:'ok';
    dbg('✓ '+endpoint+' → '+(typeof count==='number'?count+' items':'done'));
    return json;
  }catch(e){
    dbg('FETCH FAIL: '+e.message,true);
    throw e;
  }
}

/* ═══ TOAST ══════════════════════════════════════════ */

let _tt;
function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>toastEl.classList.remove('show'),2500)}

/* ═══ PITCH SVG (vertical) ═══════════════════════════ */

const PITCH_RATIO=0.648; // width/height for vertical pitch

function sizePitch(){
  const col=pitchCol.getBoundingClientRect();
  const maxH=col.height-12, maxW=col.width-12;
  let h=maxH, w=h*PITCH_RATIO;
  if(w>maxW){w=maxW;h=w/PITCH_RATIO}
  pitchEl.style.width=Math.floor(w)+'px';
  pitchEl.style.height=Math.floor(h)+'px';
}

function injectPitchSVG(){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('pl');
  svg.setAttribute('viewBox','0 0 680 1050');
  svg.setAttribute('preserveAspectRatio','none');
  const c='rgba(255,255,255,.55)';
  svg.innerHTML=
    '<rect x="0" y="0" width="680" height="150" fill="rgba(0,0,0,.035)"/>'+
    '<rect x="0" y="300" width="680" height="150" fill="rgba(0,0,0,.035)"/>'+
    '<rect x="0" y="600" width="680" height="150" fill="rgba(0,0,0,.035)"/>'+
    '<rect x="0" y="900" width="680" height="150" fill="rgba(0,0,0,.035)"/>'+
    '<rect x="20" y="20" width="640" height="1010" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<line x1="20" y1="525" x2="660" y2="525" stroke="'+c+'" stroke-width="2"/>'+
    '<circle cx="340" cy="525" r="72" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<circle cx="340" cy="525" r="4" fill="'+c+'"/>'+
    '<rect x="148" y="878" width="384" height="152" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<rect x="228" y="948" width="224" height="82" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<circle cx="340" cy="910" r="4" fill="'+c+'"/>'+
    '<path d="M 268 878 A 72 72 0 0 1 412 878" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<rect x="280" y="1030" width="120" height="16" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<rect x="148" y="20" width="384" height="152" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<rect x="228" y="20" width="224" height="82" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<circle cx="340" cy="140" r="4" fill="'+c+'"/>'+
    '<path d="M 268 172 A 72 72 0 0 0 412 172" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<rect x="280" y="4" width="120" height="16" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<path d="M 20 28 A 8 8 0 0 1 28 20" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<path d="M 652 20 A 8 8 0 0 1 660 28" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<path d="M 20 1022 A 8 8 0 0 0 28 1030" fill="none" stroke="'+c+'" stroke-width="2"/>'+
    '<path d="M 652 1030 A 8 8 0 0 0 660 1022" fill="none" stroke="'+c+'" stroke-width="2"/>';
  pitchEl.prepend(svg);
}

window.addEventListener('resize',sizePitch);

/* ═══ FORMATION GEOMETRY (vertical pitch) ════════════ */
/* y=0% top (opponent goal), y=100% bottom (own goal)
   GK near bottom, attackers near top */

function formPositions(rows){
  const pos=[{x:50,y:92}]; // GK
  const n=rows.length;
  for(let r=0;r<n;r++){
    const cnt=rows[r];
    const yPct=80 - (r/(n-1||1))*66; // 80% (backline) → 14% (front)
    for(let c=0;c<cnt;c++){
      const xPct=cnt===1?50: 14+(c/(cnt-1))*72;
      pos.push({x:xPct,y:yPct});
    }
  }
  return pos;
}

function ffToIndex(ff,rows){
  if(!ff) return -1;
  const [rr,cc]=ff.split(':').map(Number);
  if(rr===1) return 0;
  let idx=1;
  for(let i=0;i<rr-2;i++) idx+=(rows[i]||0);
  return idx+(cc-1);
}

function parseForm(s){return s.split('-').map(Number)}
function posLabel(dp,pp){return POS[dp]||GPOS[pp]||'??'}
function pName(p){return p.common_name||p.display_name||p.name||('P'+p.id)}
function sn(n){const p=(n||'').split(' ');return p[p.length-1]||n}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

/* ═══ FORM DROPDOWN ══════════════════════════════════ */

FORMS.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;selForm.appendChild(o)});

/* ═══ LOCALSTORAGE ═══════════════════════════════════ */

function sKey(tid,tab){return 'tb_'+tid+'_'+tab}
function saveTab(tid,tab){
  if(!tid)return;const t=S.tabs[tab];
  try{localStorage.setItem(sKey(tid,tab),JSON.stringify({form:t.form,notes:t.notes,
    pp:t.players.map(p=>({id:p.id,x:p.x,y:p.y}))}))}catch(e){}
}
function loadTab(tid,tab){try{const r=localStorage.getItem(sKey(tid,tab));return r?JSON.parse(r):null}catch(e){return null}}

/* ═══ RENDER ═════════════════════════════════════════ */

function renderFix(){
  fixRow.innerHTML='';
  if(!S.fixtures.length){
    const sp=document.createElement('span');sp.className='no-fix';
    sp.textContent=S.selTeam?'No recent fixtures':'Select a team';
    fixRow.appendChild(sp);return;
  }
  S.fixtures.forEach(fx=>{
    const b=document.createElement('button');
    b.className='fix-btn'+(S.selFixture===fx.id?' active':'');
    const o=fx._opp, dt=new Date(fx.starting_at), ds=(dt.getMonth()+1)+'/'+dt.getDate();
    b.innerHTML=(o&&o.image_path?'<img src="'+o.image_path+'" alt="">':'')+
      '<span class="fo">'+(o?esc(o.name):'?')+'</span>'+
      (fx._score?'<span class="fs">'+fx._score+'</span>':'')+
      '<span class="fd">'+ds+'</span>';
    b.onclick=()=>loadFixture(fx);
    fixRow.appendChild(b);
  });
}

function renderTabLabels(){
  TABS.forEach(k=>{
    const el=document.getElementById('tf'+k.charAt(0).toUpperCase()+k.slice(1));
    if(el) el.textContent=S.tabs[k].form;
  });
}

function renderPitch(){
  playersEl.innerHTML='';
  const tab=S.tabs[S.activeTab];
  pitchEmpty.style.display=tab.players.length?'none':'flex';
  tab.players.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='pm'+(S.swapSrc===i?' swap-src':'');
    el.style.left=p.x+'%';el.style.top=p.y+'%';
    el.dataset.idx=i;
    const lbl=posLabel(p.detailed_position_id,p.position_id);
    const num=p.jersey_number?'#'+p.jersey_number:'';
    el.innerHTML='<div class="dot">'+lbl+'</div><div class="pname">'+esc(p._sn||p.name)+' <span class="pnum">'+num+'</span></div>';
    el.addEventListener('mousedown',e=>startDrag(e,i));
    el.addEventListener('touchstart',e=>startDrag(e,i),{passive:false});
    el.addEventListener('click',e=>{if(!el._dragged)tapPitch(i)});
    playersEl.appendChild(el);
  });
}

function renderBench(){
  benchList.innerHTML='';
  S.bench.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='bp'+(S.swapSrc!==null?' swap-target':'');
    const lbl=posLabel(p.detailed_position_id,p.position_id);
    el.innerHTML='<span class="bpos">'+lbl+'</span><span class="bname">'+esc(p._sn||p.name)+'</span><span class="bnum">#'+(p.jersey_number||'')+'</span>';
    el.onclick=()=>tapBench(i);
    benchList.appendChild(el);
  });
}

function renderNotes(){notesEl.value=S.tabs[S.activeTab].notes||''}

function renderAll(){
  renderTabLabels();selForm.value=S.tabs[S.activeTab].form;
  renderPitch();renderBench();renderNotes();
}

/* ═══ TABS ═══════════════════════════════════════════ */

function switchTab(t){
  S.activeTab=t;S.swapSrc=null;
  $$('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  renderAll();
}
$$('.tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

/* ═══ FORMATION CHANGE ═══════════════════════════════ */

selForm.addEventListener('change',()=>{
  const tab=S.tabs[S.activeTab];tab.form=selForm.value;
  reposition(tab);renderTabLabels();renderPitch();
  saveTab(S.selTeam,S.activeTab);
});

function reposition(tab){
  const rows=parseForm(tab.form),slots=formPositions(rows);
  const gks=tab.players.filter(p=>p.position_id===24);
  const defs=tab.players.filter(p=>p.position_id===25);
  const mids=tab.players.filter(p=>p.position_id===26);
  const fwds=tab.players.filter(p=>p.position_id===27);
  const other=tab.players.filter(p=>![24,25,26,27].includes(p.position_id));
  const usedIds=new Set();
  const result=new Array(slots.length).fill(null);

  function pick(pool){const p=pool.find(p=>!usedIds.has(p.id));if(p)usedIds.add(p.id);return p||null}
  function pickAny(){for(const pool of [mids,defs,fwds,other,gks]){const p=pick(pool);if(p)return p}return null}

  result[0]=pick(gks)||pickAny();
  let si=1;
  for(let r=0;r<rows.length;r++){
    const cnt=rows[r];
    let pool=r===0?defs:r===rows.length-1?fwds:mids;
    for(let c=0;c<cnt;c++){result[si]=pick(pool)||pickAny();si++}
  }
  tab.players=result.filter(Boolean).map((p,i)=>({...p,x:slots[i]?slots[i].x:50,y:slots[i]?slots[i].y:50}));
}

/* ═══ DRAG ═══════════════════════════════════════════ */

let drag=null;

function startDrag(e,idx){
  e.preventDefault();
  const el=playersEl.children[idx];if(!el)return;
  el._dragged=false;
  const rect=pitchEl.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  drag={idx,el,rect,sx:cx,sy:cy,moved:false};
  el.classList.add('dragging');
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchmove',onDrag,{passive:false});
  document.addEventListener('touchend',endDrag);
}

function onDrag(e){
  if(!drag)return;e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  if(Math.abs(cx-drag.sx)+Math.abs(cy-drag.sy)>4)drag.moved=true;
  if(!drag.moved)return;
  let xp=((cx-drag.rect.left)/drag.rect.width)*100;
  let yp=((cy-drag.rect.top)/drag.rect.height)*100;
  xp=Math.max(4,Math.min(96,xp));yp=Math.max(4,Math.min(96,yp));
  drag.el.style.left=xp+'%';drag.el.style.top=yp+'%';
  S.tabs[S.activeTab].players[drag.idx].x=xp;
  S.tabs[S.activeTab].players[drag.idx].y=yp;
}

function endDrag(){
  if(!drag)return;
  drag.el.classList.remove('dragging');
  if(drag.moved){drag.el._dragged=true;saveTab(S.selTeam,S.activeTab)}
  else drag.el._dragged=false;
  const el=drag.el;
  setTimeout(()=>{el._dragged=false},50);
  drag=null;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',endDrag);
  document.removeEventListener('touchmove',onDrag);
  document.removeEventListener('touchend',endDrag);
}

/* ═══ SWAP ═══════════════════════════════════════════ */

function tapPitch(i){S.swapSrc=S.swapSrc===i?null:i;renderPitch();renderBench()}
function tapBench(bi){
  if(S.swapSrc===null)return;
  const tab=S.tabs[S.activeTab];
  const pp=tab.players[S.swapSrc],bp=S.bench[bi];
  const np={...bp,x:pp.x,y:pp.y};
  const nb={...pp};delete nb.x;delete nb.y;
  tab.players[S.swapSrc]=np;S.bench[bi]=nb;S.swapSrc=null;
  renderPitch();renderBench();saveTab(S.selTeam,S.activeTab);
  toast((np._sn||np.name)+' ↔ '+(nb._sn||nb.name));
}

/* ═══ NOTES ══════════════════════════════════════════ */

notesEl.addEventListener('input',()=>{
  S.tabs[S.activeTab].notes=notesEl.value;
  saveTab(S.selTeam,S.activeTab);
});

/* ═══ DATA LOADING ═══════════════════════════════════ */

async function loadLeagues(){
  try{
    const d=await api('/leagues',{include:'currentSeason',per_page:'50'});
    S.leagues=(d.data||[]).filter(l=>l.currentseason);
    selLeague.innerHTML='<option value="">League...</option>';
    S.leagues.forEach(l=>{
      const o=document.createElement('option');o.value=l.id;o.textContent=l.name;
      selLeague.appendChild(o);
    });
    dbg('Leagues ready: '+S.leagues.length);
    if(!S.leagues.length) dbg('No leagues returned — check Sportmonks plan',true);
  }catch(e){toast('Failed to load leagues');dbg('loadLeagues FAIL: '+e.message,true)}
}

selLeague.addEventListener('change',async()=>{
  const v=selLeague.value;S.selLeague=v?+v:null;
  S.selTeam=null;S.squad=[];S.fixtures=[];S.selFixture=null;
  badge.style.display='none';selTeam.disabled=true;
  selTeam.innerHTML='<option value="">Team...</option>';
  resetTabs();renderAll();renderFix();
  if(!v)return;
  const lg=S.leagues.find(l=>l.id===+v);
  if(!lg||!lg.currentseason){dbg('No currentseason on league '+v,true);return}
  try{
    selTeam.innerHTML='<option value="">Loading...</option>';
    const d=await api('/teams/seasons/'+lg.currentseason.id,{per_page:'50'});
    S.teams=(d.data||[]).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    selTeam.innerHTML='<option value="">Team...</option>';
    S.teams.forEach(t=>{const o=document.createElement('option');o.value=t.id;o.textContent=t.name;selTeam.appendChild(o)});
    selTeam.disabled=false;
    dbg('Teams: '+S.teams.length);
  }catch(e){toast('Failed to load teams');selTeam.innerHTML='<option value="">Error</option>'}
});

selTeam.addEventListener('change',async()=>{
  const v=selTeam.value;S.selTeam=v?+v:null;
  S.squad=[];S.fixtures=[];S.selFixture=null;S.swapSrc=null;
  resetTabs();renderAll();renderFix();
  if(!v){badge.style.display='none';return}
  const tm=S.teams.find(t=>t.id===+v);
  if(tm&&tm.image_path){badge.src=tm.image_path;badge.style.display='block'}
  else badge.style.display='none';
  toast('Loading squad...');
  await loadSquad(+v);
  await loadFixtures(+v);
});

async function loadSquad(tid){
  try{
    const d=await api('/squads/teams/'+tid,{include:'player'});
    S.squad=(d.data||[]).map(s=>{
      const p=s.player||{};
      return{id:s.player_id,name:pName(p),_sn:sn(pName(p)),
        position_id:s.position_id,detailed_position_id:s.detailed_position_id,
        jersey_number:s.jersey_number};
    });
    /* Log first 15 players with raw IDs so we can verify the mapping */
    S.squad.slice(0,15).forEach(p=>{
      dbg('SQUAD: '+p.name+' | pos_id='+p.position_id+' detail_id='+p.detailed_position_id+' → '+posLabel(p.detailed_position_id,p.position_id)+' #'+p.jersey_number);
    });
    setupDefaults(tid);renderAll();
    toast('Squad: '+S.squad.length+' players');
  }catch(e){toast('Squad failed');dbg('loadSquad: '+e.message,true)}
}

function setupDefaults(tid){
  const gks=S.squad.filter(p=>p.position_id===24);
  const defs=S.squad.filter(p=>p.position_id===25);
  const mids=S.squad.filter(p=>p.position_id===26);
  const fwds=S.squad.filter(p=>p.position_id===27);
  const other=S.squad.filter(p=>![24,25,26,27].includes(p.position_id));

  TABS.forEach(tab=>{
    const saved=loadTab(tid,tab);
    const form=saved?saved.form:'4-3-3';
    const rows=parseForm(form),slots=formPositions(rows);
    const usedIds=new Set();
    const result=new Array(slots.length).fill(null);

    function pick(pool){
      const p=pool.find(p=>!usedIds.has(p.id));
      if(p) usedIds.add(p.id);
      return p||null;
    }
    function pickAny(){
      for(const pool of [mids,defs,fwds,other,gks]){const p=pick(pool);if(p)return p}
      return null;
    }

    /* Slot 0 = GK */
    result[0]=pick(gks)||pickAny();

    /* Assign formation rows to position groups:
       row 0 (idx 0) = DEF, last row = FWD, everything in between = MID */
    let si=1;
    for(let r=0;r<rows.length;r++){
      const cnt=rows[r];
      let pool;
      if(r===0) pool=defs;
      else if(r===rows.length-1) pool=fwds;
      else pool=mids;
      for(let c=0;c<cnt;c++){
        result[si]=pick(pool)||pickAny();
        si++;
      }
    }

    /* Build player objects with positions */
    const starters=result.filter(Boolean).map((p,i)=>({
      ...p, x:slots[i]?slots[i].x:50, y:slots[i]?slots[i].y:50
    }));

    /* Apply saved positions */
    if(saved&&saved.pp){
      starters.forEach(p=>{
        const sp=saved.pp.find(sp=>sp.id===p.id);
        if(sp){p.x=sp.x;p.y=sp.y}
      });
    }

    const bench=S.squad.filter(p=>!usedIds.has(p.id));
    S.tabs[tab]={form,players:starters,notes:saved?saved.notes:''};
    if(tab==='base') S.bench=bench;
  });
}

function resetTabs(){
  TABS.forEach(k=>{S.tabs[k]={form:'4-3-3',players:[],notes:''}});
  S.bench=[];
}

async function loadFixtures(tid){
  try{
    const end=new Date(),start=new Date(end);start.setDate(start.getDate()-100);
    const fmt=d=>d.toISOString().split('T')[0];
    const d=await api('/fixtures/between/'+fmt(start)+'/'+fmt(end)+'/'+tid,
      {include:'formations;lineups;participants',order:'desc',per_page:'15'});
    let fx=(d.data||[]).filter(f=>f.state_id===5).slice(0,5);
    fx.forEach(f=>{
      const parts=f.participants||[];
      f._opp=parts.find(p=>p.id!==tid)||null;
      const home=parts.find(p=>p.meta&&p.meta.location==='home');
      const away=parts.find(p=>p.meta&&p.meta.location==='away');
      f._score=(home&&away&&home.meta.score!=null&&away.meta.score!=null)?
        home.meta.score+'-'+away.meta.score:'';
    });
    S.fixtures=fx;renderFix();
    dbg('Fixtures: '+fx.length);
  }catch(e){toast('Fixtures failed');dbg('loadFixtures: '+e.message,true)}
}

/* ═══ LOAD FIXTURE → CURRENT TAB ════════════════════ */

function loadFixture(fx){
  const tid=S.selTeam;if(!tid)return;
  S.selFixture=fx.id;renderFix();
  const tab=S.tabs[S.activeTab];
  const formations=fx.formations||[];
  const tf=formations.find(f=>f.participant_id===tid);
  const formStr=tf?tf.formation:'4-3-3';
  const lineups=fx.lineups||[];
  const starters=lineups.filter(l=>l.team_id===tid&&l.type_id===11);
  const subs=lineups.filter(l=>l.team_id===tid&&l.type_id===12);
  if(!starters.length){toast('No lineup data');return}
  const rows=parseForm(formStr),slots=formPositions(rows);
  const used=new Set(),players=[];
  starters.forEach(s=>{
    const sq=S.squad.find(p=>p.id===s.player_id);
    const nm=s.player_name||(sq?sq.name:'P'+s.player_id);
    let x=50,y=50;
    if(s.formation_field){
      const idx=ffToIndex(s.formation_field,rows);
      if(idx>=0&&idx<slots.length&&!used.has(idx)){x=slots[idx].x;y=slots[idx].y;used.add(idx)}
    }
    players.push({id:s.player_id,name:nm,_sn:sn(nm),
      position_id:s.position_id||(sq?sq.position_id:25),
      detailed_position_id:s.detailed_position_id||(sq?sq.detailed_position_id:148),
      jersey_number:s.jersey_number||(sq?sq.jersey_number:0),x,y});
  });
  players.forEach(p=>{
    if(p.x===50&&p.y===50){for(let i=0;i<slots.length;i++){if(!used.has(i)){p.x=slots[i].x;p.y=slots[i].y;used.add(i);break}}}
  });
  tab.form=formStr;tab.players=players;
  const subP=subs.map(s=>{
    const sq=S.squad.find(p=>p.id===s.player_id);
    const nm=s.player_name||(sq?sq.name:'P'+s.player_id);
    return{id:s.player_id,name:nm,_sn:sn(nm),
      position_id:s.position_id||(sq?sq.position_id:25),
      detailed_position_id:s.detailed_position_id||(sq?sq.detailed_position_id:148),
      jersey_number:s.jersey_number||(sq?sq.jersey_number:0)};
  });
  const allIds=new Set([...starters.map(s=>s.player_id),...subs.map(s=>s.player_id)]);
  const rest=S.squad.filter(p=>!allIds.has(p.id)).map(p=>({...p}));
  S.bench=[...subP,...rest];S.swapSrc=null;
  renderAll();saveTab(tid,S.activeTab);
  toast(formStr+' vs '+(fx._opp?fx._opp.name:'opp'));
}

/* ═══ INIT ═══════════════════════════════════════════ */

injectPitchSVG();
sizePitch();
loadLeagues();

})();
</script>
