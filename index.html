<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e14;--surface:#131920;--surface2:#1a222c;--surface3:#222d3a;
  --border:#2a3545;--text:#e0e6ed;--text2:#8899aa;--text3:#556677;
  --pitch:#1a6b37;--pitch-line:rgba(255,255,255,.65);--pitch-dark:#145a2d;
  --accent:#e8b624;--accent2:#f0c84a;--accent-dim:rgba(232,182,36,.15);
  --red:#e8364a;--blue:#3a8fd6;--green:#34c759;
  --marker:#e8b624;--marker-text:#0a0e14;--marker-bench:#3a8fd6;
  --radius:6px;--shadow:0 2px 8px rgba(0,0,0,.4);
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:8px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:44px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  color:var(--accent);white-space:nowrap}
.header select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  padding:5px 10px;border-radius:var(--radius);font-size:13px;font-family:inherit;
  cursor:pointer;max-width:200px;outline:none}
.header select:focus{border-color:var(--accent)}
.header select option{background:var(--surface2)}
.header .spacer{flex:1}
.team-badge{width:28px;height:28px;border-radius:50%;object-fit:contain;background:var(--surface3)}

/* FIXTURES ROW */
.fixtures-row{display:flex;gap:6px;padding:6px 16px;flex-shrink:0;
  overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border)}
.fixtures-row::-webkit-scrollbar{height:3px}
.fixtures-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.fixture-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:4px 10px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;transition:.15s}
.fixture-btn:hover{border-color:var(--accent);color:var(--text)}
.fixture-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.fixture-btn img{width:20px;height:20px;border-radius:50%;object-fit:contain}
.fixture-btn .fx-opp{font-weight:600;color:var(--text)}
.fixture-btn .fx-date{font-size:10px;color:var(--text3)}
.fixture-btn .fx-score{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent);letter-spacing:1px}
.no-fixtures{color:var(--text3);font-size:12px;padding:4px 0;font-style:italic}

/* TABS + FORMATION */
.tab-bar{display:flex;align-items:center;gap:0;padding:0 16px;flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 14px;background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;font-family:inherit;font-size:12px;color:var(--text2);transition:.15s;
  display:flex;flex-direction:column;align-items:center;gap:1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .tab-formation{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;
  opacity:.7}
.tab-btn.active .tab-formation{opacity:1}
.tab-spacer{flex:1}
.formation-select{display:flex;align-items:center;gap:6px;padding:6px 0}
.formation-select label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.formation-select select{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  padding:4px 8px;border-radius:var(--radius);font-size:13px;font-family:'Bebas Neue',sans-serif;
  letter-spacing:1.5px;cursor:pointer;outline:none}

/* MAIN AREA */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* PITCH */
.pitch-wrap{flex:1;display:flex;justify-content:center;align-items:center;
  padding:6px 16px;min-height:0;position:relative}
.pitch{position:relative;width:100%;max-width:620px;aspect-ratio:1.6/1;
  background:var(--pitch);border-radius:4px;overflow:hidden;
  box-shadow:0 0 0 3px var(--pitch-dark),var(--shadow);touch-action:none;user-select:none}
.pitch svg.pitch-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* PLAYER MARKERS */
.player-marker{position:absolute;width:36px;height:36px;transform:translate(-50%,-50%);
  cursor:grab;z-index:10;display:flex;flex-direction:column;align-items:center;
  transition:box-shadow .15s}
.player-marker.dragging{z-index:100;cursor:grabbing}
.player-marker.dragging .pm-dot{box-shadow:0 0 16px rgba(232,182,36,.6)}
.player-marker.swap-source .pm-dot{box-shadow:0 0 0 3px var(--red),0 0 12px rgba(232,54,74,.4)}
.pm-dot{width:30px;height:30px;border-radius:50%;background:var(--marker);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.5px;
  color:var(--marker-text);font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.5);
  transition:.15s;border:2px solid rgba(255,255,255,.2)}
.pm-name{font-size:8px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);
  white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;
  margin-top:1px;text-align:center;font-weight:600;line-height:1}

/* BENCH */
.bench-area{flex-shrink:0;padding:4px 16px 4px;display:flex;align-items:center;gap:4px;
  border-top:1px solid var(--border);overflow-x:auto;min-height:44px}
.bench-area::-webkit-scrollbar{height:3px}
.bench-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bench-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);
  font-family:'Bebas Neue',sans-serif;font-size:13px;margin-right:4px;flex-shrink:0}
.bench-player{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:3px 8px;
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;font-size:11px;color:var(--text2);transition:.15s;font-family:inherit}
.bench-player:hover{border-color:var(--marker-bench);color:var(--text)}
.bench-player.swap-target{border-color:var(--red);background:rgba(232,54,74,.1)}
.bench-player .bp-pos{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--marker-bench);
  min-width:22px;text-align:center}
.bench-player .bp-name{white-space:nowrap}

/* NOTES */
.notes-area{flex-shrink:0;padding:4px 16px 8px;display:flex;gap:8px;align-items:stretch}
.notes-area textarea{flex:1;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:var(--radius);padding:6px 10px;font-size:12px;
  font-family:inherit;resize:none;height:42px;outline:none}
.notes-area textarea::placeholder{color:var(--text3)}
.notes-area textarea:focus{border-color:var(--accent)}

/* LOADING / ERROR */
.loading-overlay{position:absolute;inset:0;background:rgba(10,14,20,.8);
  display:flex;align-items:center;justify-content:center;z-index:200;
  font-size:13px;color:var(--text2)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--surface3);color:var(--text);padding:8px 16px;border-radius:var(--radius);
  font-size:12px;box-shadow:var(--shadow);z-index:500;opacity:0;
  transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* EMPTY STATE */
.pitch-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.3);font-size:14px;text-align:center;padding:20px;pointer-events:none}

/* responsive */
@media(max-width:600px){
  .header{padding:6px 10px;gap:8px}
  .logo{font-size:18px}
  .header select{max-width:130px;font-size:12px}
  .fixtures-row{padding:6px 10px}
  .tab-bar{padding:0 10px}
  .pitch-wrap{padding:4px 8px}
  .bench-area{padding:4px 10px}
  .notes-area{padding:4px 10px 6px}
  .player-marker{width:30px;height:30px}
  .pm-dot{width:26px;height:26px;font-size:10px}
  .pm-name{font-size:7px;max-width:48px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TACTICAL BOARD</div>
  <select id="selLeague"><option value="">Select League</option></select>
  <select id="selTeam" disabled><option value="">Select Team</option></select>
  <img id="teamBadge" class="team-badge" style="display:none" alt="">
  <div class="spacer"></div>
</div>

<div class="fixtures-row" id="fixturesRow">
  <span class="no-fixtures" id="noFixtures">Select a team to load fixtures</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="base">
    <span>Base Shape</span><span class="tab-formation" id="tabFormBase">4-3-3</span>
  </button>
  <button class="tab-btn" data-tab="inPoss">
    <span>In Possession</span><span class="tab-formation" id="tabFormInPoss">4-3-3</span>
  </button>
  <button class="tab-btn" data-tab="outPoss">
    <span>Out of Poss</span><span class="tab-formation" id="tabFormOutPoss">4-3-3</span>
  </button>
  <div class="tab-spacer"></div>
  <div class="formation-select">
    <label>Formation</label>
    <select id="selFormation"></select>
  </div>
</div>

<div class="main">
  <div class="pitch-wrap">
    <div class="pitch" id="pitch">
      <svg class="pitch-lines" viewBox="0 0 620 388" preserveAspectRatio="none">
        <rect x="0" y="0" width="620" height="388" fill="none"/>
        <!-- pitch stripes -->
        <rect x="0" y="0" width="77.5" height="388" fill="rgba(0,0,0,.04)"/>
        <rect x="155" y="0" width="77.5" height="388" fill="rgba(0,0,0,.04)"/>
        <rect x="310" y="0" width="77.5" height="388" fill="rgba(0,0,0,.04)"/>
        <rect x="465" y="0" width="77.5" height="388" fill="rgba(0,0,0,.04)"/>
        <!-- outline -->
        <rect x="10" y="10" width="600" height="368" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <!-- halfway -->
        <line x1="310" y1="10" x2="310" y2="378" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <circle cx="310" cy="194" r="48" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <circle cx="310" cy="194" r="3" fill="var(--pitch-line)"/>
        <!-- left penalty area -->
        <rect x="10" y="94" width="88" height="200" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <rect x="10" y="140" width="36" height="108" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <circle cx="76" cy="194" r="3" fill="var(--pitch-line)"/>
        <path d="M 98 148 A 48 48 0 0 1 98 240" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <!-- left goal -->
        <rect x="2" y="172" width="8" height="44" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <!-- right penalty area -->
        <rect x="522" y="94" width="88" height="200" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <rect x="574" y="140" width="36" height="108" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <circle cx="544" cy="194" r="3" fill="var(--pitch-line)"/>
        <path d="M 522 148 A 48 48 0 0 0 522 240" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <!-- right goal -->
        <rect x="610" y="172" width="8" height="44" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <!-- corners -->
        <path d="M 10 16 A 6 6 0 0 1 16 10" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <path d="M 604 10 A 6 6 0 0 1 610 16" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <path d="M 10 372 A 6 6 0 0 0 16 378" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
        <path d="M 604 378 A 6 6 0 0 0 610 372" fill="none" stroke="var(--pitch-line)" stroke-width="1.5"/>
      </svg>
      <div class="pitch-empty" id="pitchEmpty">Select a league and team to begin</div>
      <div id="pitchPlayers"></div>
    </div>
  </div>

  <div class="bench-area" id="benchArea">
    <span class="bench-label">BENCH</span>
  </div>

  <div class="notes-area">
    <textarea id="notesInput" placeholder="Tactical notes for this phase..." rows="2"></textarea>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

/* ── Constants ────────────────────────────────────────── */

const POS_LABELS = {
  24:'GK',148:'CB',149:'LB',150:'RB',151:'DM',152:'CM',153:'LWB',154:'RWB',
  155:'AM',156:'LM',157:'RM',158:'LW',159:'RW',160:'CF',161:'ST',162:'SS'
};
const GENPOS = {24:'GK',25:'DEF',26:'MID',27:'FWD'};

const FORMATIONS = [
  '3-4-3','3-5-2','3-4-1-2','4-3-3','4-4-2','4-2-3-1','4-1-4-1',
  '4-4-1-1','4-5-1','4-1-2-1-2','4-2-2-2','5-3-2','5-4-1','5-2-3'
];

const TAB_KEYS = ['base','inPoss','outPoss'];
const TAB_NAMES = {base:'Base Shape',inPoss:'In Possession',outPoss:'Out of Poss'};

/* ── State ────────────────────────────────────────────── */

let state = {
  leagues:[],teams:[],squad:[],fixtures:[],
  selectedLeague:null,selectedTeam:null,selectedFixture:null,
  activeTab:'base',swapSource:null,
  tabs:{
    base:{formation:'4-3-3',players:[],notes:''},
    inPoss:{formation:'4-3-3',players:[],notes:''},
    outPoss:{formation:'4-3-3',players:[],notes:''}
  },
  bench:[]
};

/* ── DOM refs ─────────────────────────────────────────── */

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

const selLeague=$('#selLeague'), selTeam=$('#selTeam'), selFormation=$('#selFormation');
const teamBadge=$('#teamBadge'), fixturesRow=$('#fixturesRow'), noFixtures=$('#noFixtures');
const pitchEl=$('#pitch'), pitchPlayers=$('#pitchPlayers'), pitchEmpty=$('#pitchEmpty');
const benchArea=$('#benchArea'), notesInput=$('#notesInput'), toastEl=$('#toast');

/* ── API helper ───────────────────────────────────────── */

async function api(path){
  const url='/api/proxy?path='+encodeURIComponent(path);
  const r=await fetch(url);
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}

/* ── Toast ─────────────────────────────────────────────── */

let toastTimer;
function toast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2500);
}

/* ── Formation geometry ───────────────────────────────── */

function parseFormation(str){
  return str.split('-').map(Number);
}

/* Given formation rows (e.g. [4,3,3]), returns an array of {x,y} in percent
   Index 0 = GK, then rows left to right. Pitch is landscape: x=0 is left goal, x=100 right.
   We place team on LEFT half attacking right. */
function formationPositions(rows){
  const totalRows=rows.length+1; // +1 for GK
  const positions=[];
  // GK
  positions.push({x:6, y:50});
  for(let r=0;r<rows.length;r++){
    const count=rows[r];
    const xPct=8 + ((r+1)/(totalRows)) * 84;
    for(let c=0;c<count;c++){
      const yPct= count===1 ? 50 : 12 + (c/(count-1))*76;
      positions.push({x:xPct, y:yPct});
    }
  }
  return positions;
}

/* Convert formation_field "row:col" (1-indexed) to index in our positions array.
   Row 1 = GK (index 0). Row 2 = first formation row, etc.
   Col is 1-indexed within the row. */
function formationFieldToIndex(ff, rows){
  if(!ff) return -1;
  const parts=ff.split(':');
  const row=parseInt(parts[0],10);
  const col=parseInt(parts[1],10);
  if(row===1) return 0; // GK
  let idx=1; // start after GK
  for(let r=0;r<row-2;r++){
    idx+=rows[r]||0;
  }
  return idx+(col-1);
}

/* ── Player label ─────────────────────────────────────── */

function posLabel(detailedPosId, posId){
  return POS_LABELS[detailedPosId] || GENPOS[posId] || '??';
}

function playerDisplayName(p){
  return p.common_name || p.display_name || p.name || ('Player '+p.id);
}

/* ── Populate formation dropdown ──────────────────────── */

function initFormationDropdown(){
  selFormation.innerHTML='';
  FORMATIONS.forEach(f=>{
    const o=document.createElement('option');
    o.value=f; o.textContent=f;
    selFormation.appendChild(o);
  });
}

/* ── localStorage helpers ─────────────────────────────── */

function storageKey(teamId, tab){ return 'tb_'+teamId+'_'+tab; }

function saveTabState(teamId, tab){
  if(!teamId) return;
  const t=state.tabs[tab];
  const data={
    formation:t.formation,
    notes:t.notes,
    playerPositions:t.players.map(p=>({id:p.id,x:p.x,y:p.y}))
  };
  try{localStorage.setItem(storageKey(teamId,tab),JSON.stringify(data))}catch(e){}
}

function loadTabState(teamId, tab){
  try{
    const raw=localStorage.getItem(storageKey(teamId,tab));
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){return null}
}

/* ── Render helpers ───────────────────────────────────── */

function renderFixtures(){
  // Clear all but the label
  fixturesRow.innerHTML='';
  if(!state.fixtures.length){
    const sp=document.createElement('span');
    sp.className='no-fixtures';
    sp.textContent=state.selectedTeam?'No recent fixtures found':'Select a team to load fixtures';
    fixturesRow.appendChild(sp);
    return;
  }
  state.fixtures.forEach((fx,i)=>{
    const btn=document.createElement('button');
    btn.className='fixture-btn'+(state.selectedFixture===fx.id?' active':'');
    const opp=fx._opponent;
    const dt=new Date(fx.starting_at);
    const dateStr=(dt.getMonth()+1)+'/'+dt.getDate();
    btn.innerHTML=
      (opp&&opp.image_path?'<img src="'+opp.image_path+'" alt="">':'')+
      '<span class="fx-opp">'+(opp?opp.name:'?')+'</span>'+
      (fx._score?'<span class="fx-score">'+fx._score+'</span>':'')+
      '<span class="fx-date">'+dateStr+'</span>';
    btn.addEventListener('click',()=>loadFixture(fx));
    fixturesRow.appendChild(btn);
  });
}

function renderTabLabels(){
  TAB_KEYS.forEach(k=>{
    const el=$('#tabForm'+k.charAt(0).toUpperCase()+k.slice(1));
    if(el) el.textContent=state.tabs[k].formation;
  });
}

function renderPitch(){
  pitchPlayers.innerHTML='';
  const tab=state.tabs[state.activeTab];
  if(!tab.players.length){
    pitchEmpty.style.display='flex';
    return;
  }
  pitchEmpty.style.display='none';

  tab.players.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='player-marker';
    if(state.swapSource===i) el.classList.add('swap-source');
    el.style.left=p.x+'%';
    el.style.top=p.y+'%';
    el.dataset.idx=i;

    const label=posLabel(p.detailed_position_id, p.position_id);
    el.innerHTML=
      '<div class="pm-dot">'+label+'</div>'+
      '<div class="pm-name">'+escHtml(p.shortName||p.name)+'</div>';

    // Drag
    el.addEventListener('mousedown',e=>startDrag(e,i));
    el.addEventListener('touchstart',e=>startDrag(e,i),{passive:false});

    // Tap for swap
    el.addEventListener('click',e=>{
      if(el._dragged) return;
      handlePitchPlayerTap(i);
    });

    pitchPlayers.appendChild(el);
  });
}

function renderBench(){
  benchArea.innerHTML='<span class="bench-label">BENCH</span>';
  state.bench.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='bench-player';
    if(state.swapSource!==null) el.classList.add('swap-target');
    const label=posLabel(p.detailed_position_id, p.position_id);
    el.innerHTML='<span class="bp-pos">'+label+'</span><span class="bp-name">'+escHtml(p.shortName||p.name)+'</span>';
    el.addEventListener('click',()=>handleBenchPlayerTap(i));
    benchArea.appendChild(el);
  });
}

function renderNotes(){
  notesInput.value=state.tabs[state.activeTab].notes||'';
}

function renderAll(){
  renderTabLabels();
  selFormation.value=state.tabs[state.activeTab].formation;
  renderPitch();
  renderBench();
  renderNotes();
}

function escHtml(s){
  const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}

/* ── Tab switching ────────────────────────────────────── */

function switchTab(tab){
  state.activeTab=tab;
  state.swapSource=null;
  $$('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  renderAll();
}

$$('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

/* ── Formation change ─────────────────────────────────── */

selFormation.addEventListener('change',()=>{
  const tab=state.tabs[state.activeTab];
  tab.formation=selFormation.value;
  repositionPlayersToFormation(tab);
  renderTabLabels();
  renderPitch();
  saveTabState(state.selectedTeam, state.activeTab);
});

function repositionPlayersToFormation(tab){
  const rows=parseFormation(tab.formation);
  const positions=formationPositions(rows);
  // Match players to positions: try to smartly assign by position type
  const assigned=new Array(positions.length).fill(null);
  const remaining=[...tab.players];

  // Assign GK first
  const gkIdx=remaining.findIndex(p=>p.position_id===24);
  if(gkIdx>-1){
    assigned[0]={...remaining[gkIdx],x:positions[0].x,y:positions[0].y};
    remaining.splice(gkIdx,1);
  }

  // Fill remaining slots with remaining players in order
  let slot=0;
  for(let i=0;i<positions.length;i++){
    if(assigned[i]) continue;
    if(remaining.length){
      const p=remaining.shift();
      assigned[i]={...p,x:positions[i].x,y:positions[i].y};
    }
  }

  tab.players=assigned.filter(Boolean);
}

/* ── Drag & drop ──────────────────────────────────────── */

let dragState=null;

function startDrag(e,idx){
  e.preventDefault();
  const el=pitchPlayers.children[idx];
  if(!el) return;
  el._dragged=false;
  const rect=pitchEl.getBoundingClientRect();
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  const clientY=e.touches?e.touches[0].clientY:e.clientY;

  dragState={idx,el,rect,startX:clientX,startY:clientY,moved:false};
  el.classList.add('dragging');

  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchmove',onDrag,{passive:false});
  document.addEventListener('touchend',endDrag);
}

function onDrag(e){
  if(!dragState) return;
  e.preventDefault();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  const dx=cx-dragState.startX, dy=cy-dragState.startY;
  if(Math.abs(dx)+Math.abs(dy)>4) dragState.moved=true;
  if(!dragState.moved) return;

  const rect=dragState.rect;
  let xPct=((cx-rect.left)/rect.width)*100;
  let yPct=((cy-rect.top)/rect.height)*100;
  xPct=Math.max(3,Math.min(97,xPct));
  yPct=Math.max(5,Math.min(95,yPct));

  dragState.el.style.left=xPct+'%';
  dragState.el.style.top=yPct+'%';

  const tab=state.tabs[state.activeTab];
  tab.players[dragState.idx].x=xPct;
  tab.players[dragState.idx].y=yPct;
}

function endDrag(){
  if(!dragState) return;
  const el=dragState.el;
  const moved=dragState.moved;
  el.classList.remove('dragging');
  if(moved) el._dragged=true;
  else el._dragged=false;
  // Clear _dragged flag after a tick so click handler can read it
  setTimeout(()=>{el._dragged=false},50);
  if(moved) saveTabState(state.selectedTeam, state.activeTab);
  dragState=null;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',endDrag);
  document.removeEventListener('touchmove',onDrag);
  document.removeEventListener('touchend',endDrag);
}

/* ── Swap (tap pitch player, then bench player) ───────── */

function handlePitchPlayerTap(idx){
  if(state.swapSource===idx){
    state.swapSource=null;
  } else {
    state.swapSource=idx;
  }
  renderPitch();
  renderBench();
}

function handleBenchPlayerTap(benchIdx){
  if(state.swapSource===null) return;
  const tab=state.tabs[state.activeTab];
  const pitchPlayer=tab.players[state.swapSource];
  const benchPlayer=state.bench[benchIdx];

  // Swap: bench player takes pitch player's position
  const newPitch={...benchPlayer, x:pitchPlayer.x, y:pitchPlayer.y};
  const newBench={...pitchPlayer};
  delete newBench.x; delete newBench.y;

  tab.players[state.swapSource]=newPitch;
  state.bench[benchIdx]=newBench;
  state.swapSource=null;

  renderPitch();
  renderBench();
  saveTabState(state.selectedTeam, state.activeTab);
  toast('Swapped: '+newPitch.shortName+' ↔ '+newBench.shortName);
}

/* ── Notes ────────────────────────────────────────────── */

notesInput.addEventListener('input',()=>{
  state.tabs[state.activeTab].notes=notesInput.value;
  saveTabState(state.selectedTeam, state.activeTab);
});

/* ── Data loading ─────────────────────────────────────── */

async function loadLeagues(){
  try{
    const data=await api('/leagues?include=currentSeason&per_page=50');
    state.leagues=(data.data||[]).filter(l=>l.currentseason);
    selLeague.innerHTML='<option value="">Select League</option>';
    state.leagues.forEach(l=>{
      const o=document.createElement('option');
      o.value=l.id;
      o.textContent=l.name;
      selLeague.appendChild(o);
    });
  }catch(e){
    toast('Failed to load leagues');
    console.error(e);
  }
}

selLeague.addEventListener('change',async()=>{
  const lid=selLeague.value;
  state.selectedLeague=lid?Number(lid):null;
  state.selectedTeam=null;
  state.squad=[];state.fixtures=[];state.selectedFixture=null;
  teamBadge.style.display='none';
  selTeam.disabled=true;
  selTeam.innerHTML='<option value="">Select Team</option>';
  resetTabs();
  renderAll();
  renderFixtures();

  if(!lid) return;
  const league=state.leagues.find(l=>l.id===Number(lid));
  if(!league||!league.currentseason) return;

  try{
    selTeam.innerHTML='<option value="">Loading...</option>';
    const seasonId=league.currentseason.id;
    const data=await api('/teams/seasons/'+seasonId+'?per_page=50');
    state.teams=(data.data||[]).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    selTeam.innerHTML='<option value="">Select Team</option>';
    state.teams.forEach(t=>{
      const o=document.createElement('option');
      o.value=t.id;
      o.textContent=t.name;
      selTeam.appendChild(o);
    });
    selTeam.disabled=false;
  }catch(e){
    toast('Failed to load teams');
    selTeam.innerHTML='<option value="">Error</option>';
  }
});

selTeam.addEventListener('change',async()=>{
  const tid=selTeam.value;
  state.selectedTeam=tid?Number(tid):null;
  state.squad=[];state.fixtures=[];state.selectedFixture=null;
  state.swapSource=null;
  resetTabs();
  renderAll();
  renderFixtures();

  if(!tid) {teamBadge.style.display='none';return;}

  const team=state.teams.find(t=>t.id===Number(tid));
  if(team&&team.image_path){
    teamBadge.src=team.image_path;teamBadge.style.display='block';
  }else{teamBadge.style.display='none'}

  toast('Loading squad...');
  await loadSquad(Number(tid));
  await loadFixtures(Number(tid));
});

async function loadSquad(teamId){
  try{
    const data=await api('/squads/teams/'+teamId+'?include=player');
    const raw=data.data||[];
    state.squad=raw.map(s=>{
      const p=s.player||{};
      return {
        id:s.player_id,
        name:playerDisplayName(p),
        shortName: (p.common_name||p.display_name||'').split(' ').pop() || playerDisplayName(p),
        position_id:s.position_id,
        detailed_position_id:s.detailed_position_id,
        jersey_number:s.jersey_number
      };
    });
    // Set up default XI and bench for each tab
    setupDefaultFormations(teamId);
    renderAll();
    toast('Squad loaded: '+state.squad.length+' players');
  }catch(e){
    toast('Failed to load squad');
    console.error(e);
  }
}

function setupDefaultFormations(teamId){
  // Sort squad: GK first, then DEF, MID, FWD
  const posOrder={24:0,25:1,26:2,27:3};
  const sorted=[...state.squad].sort((a,b)=>(posOrder[a.position_id]||4)-(posOrder[b.position_id]||4));

  TAB_KEYS.forEach(tab=>{
    const saved=loadTabState(teamId, tab);
    const formation=saved?saved.formation:'4-3-3';
    const rows=parseFormation(formation);
    const slots=formationPositions(rows);
    const totalSlots=slots.length; // should be 11

    let starters=sorted.slice(0,Math.min(totalSlots,sorted.length));
    let bench=sorted.slice(Math.min(totalSlots,sorted.length));

    // Apply saved positions if available
    const players=starters.map((p,i)=>{
      const pos=slots[i]||{x:50,y:50};
      let x=pos.x, y=pos.y;
      if(saved&&saved.playerPositions){
        const sp=saved.playerPositions.find(sp=>sp.id===p.id);
        if(sp){x=sp.x;y=sp.y}
      }
      return {...p, x, y};
    });

    state.tabs[tab]={formation,players,notes:saved?saved.notes:''};
    if(tab==='base') state.bench=bench;
  });
}

function resetTabs(){
  TAB_KEYS.forEach(k=>{
    state.tabs[k]={formation:'4-3-3',players:[],notes:''};
  });
  state.bench=[];
}

async function loadFixtures(teamId){
  try{
    const end=new Date();
    const start=new Date(end);
    start.setDate(start.getDate()-100);
    const fmt=d=>d.toISOString().split('T')[0];
    const path='/fixtures/between/'+fmt(start)+'/'+fmt(end)+'/'+teamId+
      '?include=formations;lineups;participants&order=desc&per_page=15';
    const data=await api(path);
    let fixtures=(data.data||[]);
    // Filter to played games (state_id === 5)
    fixtures=fixtures.filter(f=>f.state_id===5);
    // Take top 5
    fixtures=fixtures.slice(0,5);
    // Enrich with opponent info
    fixtures.forEach(fx=>{
      const parts=fx.participants||[];
      const opp=parts.find(p=>p.id!==teamId);
      fx._opponent=opp||null;
      // Build score string
      const home=parts.find(p=>p.meta&&p.meta.location==='home');
      const away=parts.find(p=>p.meta&&p.meta.location==='away');
      if(home&&away){
        const hs=home.meta.winner!==undefined?(home.meta.winner?'W':''):null;
        fx._score=(home.meta.score!=null&&away.meta.score!=null)?
          home.meta.score+'-'+away.meta.score:'';
      }else{fx._score=''}
    });
    state.fixtures=fixtures;
    renderFixtures();
  }catch(e){
    toast('Failed to load fixtures');
    console.error(e);
  }
}

/* ── Load fixture onto current tab ────────────────────── */

async function loadFixture(fx){
  const teamId=state.selectedTeam;
  if(!teamId) return;

  state.selectedFixture=fx.id;
  renderFixtures();

  const tab=state.tabs[state.activeTab];

  // Get formation for this team
  const formations=fx.formations||[];
  const teamForm=formations.find(f=>f.participant_id===teamId);
  const formStr=teamForm?teamForm.formation:'4-3-3';

  // Get starters
  const lineups=fx.lineups||[];
  const starters=lineups.filter(l=>l.team_id===teamId && l.type_id===11);
  const subs=lineups.filter(l=>l.team_id===teamId && l.type_id===12);

  if(!starters.length){
    toast('No lineup data for this fixture');
    return;
  }

  const rows=parseFormation(formStr);
  const positions=formationPositions(rows);

  // Build player objects with positions from formation_field
  const players=[];
  const usedPositions=new Set();

  starters.forEach(s=>{
    const squadP=state.squad.find(p=>p.id===s.player_id);
    const name=s.player_name||playerDisplayName(s.player||squadP||{id:s.player_id});
    const shortName=name.split(' ').pop()||name;
    
    let x=50,y=50;
    if(s.formation_field){
      const posIdx=formationFieldToIndex(s.formation_field, rows);
      if(posIdx>=0 && posIdx<positions.length && !usedPositions.has(posIdx)){
        x=positions[posIdx].x;
        y=positions[posIdx].y;
        usedPositions.add(posIdx);
      }
    }

    players.push({
      id:s.player_id,
      name,
      shortName,
      position_id:s.position_id||( squadP?squadP.position_id:25),
      detailed_position_id:s.detailed_position_id||(squadP?squadP.detailed_position_id:148),
      jersey_number:s.jersey_number||(squadP?squadP.jersey_number:0),
      x,y
    });
  });

  // Any players without formation_field: assign to remaining positions
  players.forEach((p,i)=>{
    if(p.x===50&&p.y===50){
      for(let pi=0;pi<positions.length;pi++){
        if(!usedPositions.has(pi)){
          p.x=positions[pi].x;
          p.y=positions[pi].y;
          usedPositions.add(pi);
          break;
        }
      }
    }
  });

  tab.formation=formStr;
  tab.players=players;

  // Build bench from subs
  const subPlayers=subs.map(s=>{
    const squadP=state.squad.find(p=>p.id===s.player_id);
    const name=s.player_name||playerDisplayName(s.player||squadP||{id:s.player_id});
    return {
      id:s.player_id,
      name,
      shortName:name.split(' ').pop()||name,
      position_id:s.position_id||(squadP?squadP.position_id:25),
      detailed_position_id:s.detailed_position_id||(squadP?squadP.detailed_position_id:148),
      jersey_number:s.jersey_number||(squadP?squadP.jersey_number:0)
    };
  });

  // Also add squad members not in starting XI or subs
  const allLineupIds=new Set([...starters.map(s=>s.player_id),...subs.map(s=>s.player_id)]);
  const restBench=state.squad.filter(p=>!allLineupIds.has(p.id)).map(p=>({...p}));

  state.bench=[...subPlayers,...restBench];
  state.swapSource=null;

  renderAll();
  saveTabState(teamId, state.activeTab);
  toast('Loaded: '+formStr+' vs '+(fx._opponent?fx._opponent.name:'opponent'));
}

/* ── Init ─────────────────────────────────────────────── */

initFormationDropdown();
loadLeagues();

})();
